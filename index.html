<html class="light" lang="en"><head>

                      "primary": "#0058be",
                      "on-tertiary-container": "#fffbff",

                      "tertiary-container": "#b75b00",
                      "primary-fixed": "#d8e2ff",
                      "outline": "#727785",

                      "secondary-fixed": "#d8e2ff",
                      "on-tertiary-fixed": "#311400",
                      "surface-bright": "#f9f9ff",

                      "surface-container": "#e9edff",

              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "9999px"
              },
              "spacing": {
                      "unit": "8px",
                      "section-gap": "64px",
                      "button-group": "24px",
                      "container-padding": "40px"
              },
              "fontFamily": {
                      "button-label": [
                              "Inter"
                      ],
                      "counter-display": [
                              "Inter"
                      ],
                      "utility-label": [

                      ]
              },
              "fontSize": {
                      "button-label": [
                              "18px",

                      ],
                      "counter-display": [

      </script>
</head>
<body class="bg-surface text-on-surface h-screen w-screen overflow-hidden flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="flex-1 flex flex-col items-center justify-center w-full px-container-padding">
<div class="flex flex-col items-center justify-center w-full max-w-sm">
<div id="counter-display" class="font-counter-display text-counter-display text-on-surface tabular-nums tracking-tighter select-none flex items-center justify-center w-full">
                0
            </div>
<div class="h-section-gap w-full flex-shrink-0"></div>
<div class="flex items-center justify-center gap-button-group w-full">
<button id="decrement-btn" aria-label="Decrease count" class="group relative w-20 h-20 sm:w-24 sm:h-24 rounded-full border border-outline flex items-center justify-center bg-transparent text-on-surface hover:bg-surface-container-high transition-colors duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-surface active:scale-95 touch-manipulation" type="button">
<span class="material-symbols-outlined transition-transform duration-200 group-active:scale-90" style="font-size: 36px; font-variation-settings: 'wght' 300;">
                        remove
                    </span>
</button>
<button id="increment-btn" aria-label="Increase count" class="group relative w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-primary flex items-center justify-center text-on-primary hover:opacity-90 transition-opacity duration-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-surface active:scale-95 touch-manipulation" type="button">
<span class="material-symbols-outlined transition-transform duration-200 group-active:scale-90" style="font-size: 36px; font-variation-settings: 'wght' 400;">
                        add
                    </span>
</button>
</div>
</div>
</main>
<script>
(function() {
    let count = 0;

    const display = document.getElementById('counter-display');
    const decrementBtn = document.getElementById('decrement-btn');
    const incrementBtn = document.getElementById('increment-btn');

    function updateDisplay() {
        display.textContent = count;
    }

    incrementBtn.addEventListener('click', function() {
        count++;
        updateDisplay();
    });

    decrementBtn.addEventListener('click', function() {
        count--;
        updateDisplay();
    });
})();
</script>
</body></html>
